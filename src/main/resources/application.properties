spring.application.name=HireFlow

# Required env vars: DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hireflow}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.thymeleaf.cache=true

# Required env vars: MAIL_USERNAME, MAIL_PASSWORD
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Required env var: JWT_SECRET (must be at least 32 characters for HS256)
jwt.secret=${JWT_SECRET}

server.port=9090

# Recruiter access code — only staff with this code can register as recruiter
# Required env var: RECRUITER_CODE (falls back to default if not set)
recruiter.access.code=${RECRUITER_CODE:HIREFLOW2026}

# Resume upload directory
app.upload.dir=uploads/resumes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
