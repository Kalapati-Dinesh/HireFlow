<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireFlow — Reset Password</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --navy:#1a2744; --accent:#2563eb; --border:#e2e8f0; --muted:#64748b; --bg:#f8fafc; }
        html, body { height: 100%; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
        .logo-top { position: fixed; top: 20px; left: 28px; font-size: 1.2rem; font-weight: 700; color: var(--navy); text-decoration: none; letter-spacing: -0.3px; }
        .logo-top span { color: var(--accent); }
        .card { background: #fff; border-radius: 10px; border: 1px solid var(--border); padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(26,39,68,0.07); }
        .icon { width: 52px; height: 52px; border-radius: 50%; background: #eff6ff; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: var(--accent); margin-bottom: 20px; }
        h2 { font-size: 1.4rem; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
        .sub { font-size: 0.86rem; color: var(--muted); margin-bottom: 24px; }
        .alert-err { background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 12px 14px; font-size: 0.84rem; color: #dc2626; display: flex; align-items: flex-start; gap: 8px; margin-bottom: 18px; }
        .alert-err a { color: #dc2626; font-weight: 600; }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 7px; }
        .iw { position: relative; }
        .iw .li { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.88rem; pointer-events: none; }
        .iw input { width: 100%; padding: 10px 38px 10px 36px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.875rem; font-family: 'Inter', sans-serif; background: #fff; color: #1e293b; outline: none; transition: border-color 0.18s, box-shadow 0.18s; }
        .iw input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
        .iw input::placeholder { color: #cbd5e1; }
        .eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; cursor: pointer; font-size: 0.88rem; transition: color 0.18s; background: none; border: none; }
        .eye:hover { color: var(--accent); }
        .sbar { height: 3px; background: var(--border); border-radius: 4px; margin-top: 7px; overflow: hidden; }
        .sfill { height: 100%; width: 0%; border-radius: 4px; transition: width 0.3s, background 0.3s; }
        .slbl { font-size: 0.72rem; margin-top: 4px; font-weight: 500; }
        .match-msg { font-size: 0.75rem; margin-top: 5px; font-weight: 500; }
        .btn-submit { width: 100%; padding: 11px; background: var(--navy); color: #fff; border: 2px solid var(--navy); border-radius: 6px; font-size: 0.875rem; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px; }
        .btn-submit:hover { background: #243358; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .back { display: block; text-align: center; margin-top: 16px; font-size: 0.82rem; color: var(--muted); text-decoration: none; }
        .back:hover { color: var(--accent); }
    </style>
</head>
<body>
<a href="/" class="logo-top">Hire<span>Flow</span></a>
<div class="card">
    <div class="icon"><i class="bi bi-lock-fill"></i></div>
    <h2>Reset Password</h2>
    <p class="sub">Enter and confirm your new password below.</p>

    <!-- Token invalid / expired -->
    <div th:if="${error}" class="alert-err">
        <i class="bi bi-exclamation-circle-fill" style="margin-top:2px; flex-shrink:0;"></i>
        <span>
            <span th:text="${error}"></span><br>
            <a href="/forgot-password">← Try again with your email</a>
        </span>
    </div>

    <!-- Reset form — shown when token is valid -->
    <form th:if="${token != null}" action="/reset-password" method="post" id="resetForm">
        <input type="hidden" name="token" th:value="${token}">

        <div class="field">
            <label>New Password</label>
            <div class="iw">
                <i class="bi bi-lock li"></i>
                <input type="password" name="password" id="pwd"
                       placeholder="Min. 8 characters" required minlength="8"
                       oninput="checkStrength(this.value); checkMatch()">
                <button type="button" class="eye" onclick="toggleEye('pwd','ei')">
                    <i class="bi bi-eye" id="ei"></i>
                </button>
            </div>
            <div class="sbar"><div class="sfill" id="sBar"></div></div>
            <div class="slbl" id="sLabel" style="color:#94a3b8;"></div>
        </div>

        <div class="field">
            <label>Confirm Password</label>
            <div class="iw">
                <i class="bi bi-lock-fill li"></i>
                <input type="password" id="cpwd"
                       placeholder="Re-enter your password" required
                       oninput="checkMatch()">
                <button type="button" class="eye" onclick="toggleEye('cpwd','cei')">
                    <i class="bi bi-eye" id="cei"></i>
                </button>
            </div>
            <div class="match-msg" id="matchMsg"></div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn" disabled>
            <i class="bi bi-check2-circle"></i> Reset Password
        </button>
    </form>

    <a href="/login" class="back"><i class="bi bi-arrow-left"></i> Back to Sign In</a>
</div>
<script>
    function toggleEye(inputId, iconId) {
        const p = document.getElementById(inputId);
        const i = document.getElementById(iconId);
        p.type = p.type === 'password' ? 'text' : 'password';
        i.className = p.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    }

    function checkStrength(v) {
        let s = 0;
        if (v.length >= 8) s++;
        if (/[A-Z]/.test(v)) s++;
        if (/[0-9]/.test(v)) s++;
        if (/[^A-Za-z0-9]/.test(v)) s++;
        const m = [['0%','',''],['25%','#ef4444','Weak'],['50%','#f97316','Fair'],['75%','#eab308','Good'],['100%','#22c55e','Strong']];
        document.getElementById('sBar').style.width = m[s][0];
        document.getElementById('sBar').style.background = m[s][1];
        const lbl = document.getElementById('sLabel');
        lbl.textContent = v.length ? m[s][2] : '';
        lbl.style.color = m[s][1];
    }

    function checkMatch() {
        const pwd = document.getElementById('pwd').value;
        const cpwd = document.getElementById('cpwd').value;
        const msg = document.getElementById('matchMsg');
        const btn = document.getElementById('submitBtn');
        if (!cpwd) { msg.textContent = ''; btn.disabled = true; return; }
        if (pwd === cpwd && pwd.length >= 8) {
            msg.textContent = '✓ Passwords match';
            msg.style.color = '#22c55e';
            btn.disabled = false;
        } else {
            msg.textContent = pwd !== cpwd ? '✗ Passwords do not match' : '✗ Minimum 8 characters required';
            msg.style.color = '#ef4444';
            btn.disabled = true;
        }
    }
</script>
</body>
</html>
