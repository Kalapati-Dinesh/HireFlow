<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireFlow — Success</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --navy:#1a2744; --accent:#2563eb; --border:#e2e8f0; --muted:#64748b; --bg:#f8fafc; }
        html, body { height: 100%; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .logo-top { position: fixed; top: 20px; left: 28px; font-size: 1.2rem; font-weight: 700; color: var(--navy); text-decoration: none; letter-spacing: -0.3px; }
        .logo-top span { color: var(--accent); }

        .card { background: #fff; border-radius: 8px; border: 1px solid var(--border); padding: 52px 44px; text-align: center; max-width: 420px; width: 90%; }
        .icon { width: 60px; height: 60px; border-radius: 50%; background: var(--navy); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: #60a5fa; margin: 0 auto 24px; }
        h2 { font-size: 1.4rem; font-weight: 700; color: var(--navy); letter-spacing: -0.4px; margin-bottom: 8px; }
        .msg { color: var(--muted); font-size: 0.88rem; line-height: 1.65; margin-bottom: 32px; }

        .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-p { padding: 10px 22px; background: var(--navy); color: #fff; border: 2px solid var(--navy); border-radius: 6px; font-size: 0.875rem; font-weight: 600; font-family: 'Inter', sans-serif; text-decoration: none; display: inline-flex; align-items: center; gap: 7px; transition: background 0.18s; }
        .btn-p:hover { background: #243358; border-color: #243358; color: #fff; }
        .btn-s { padding: 10px 22px; background: #fff; color: #374151; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.875rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 7px; transition: background 0.18s; }
        .btn-s:hover { background: var(--bg); color: #374151; }

        .foot { position: fixed; bottom: 16px; font-size: 0.75rem; color: #94a3b8; }
    </style>
</head>
<body>
<a href="/" class="logo-top">Hire<span>Flow</span></a>
<div class="card">
    <div class="icon"><i class="bi bi-check2"></i></div>
    <h2>You're all set!</h2>
    <p class="msg" th:text="${msg}">Operation completed successfully.</p>
    <div class="btns">
        <a href="/login" class="btn-p"><i class="bi bi-box-arrow-in-right"></i> Sign In</a>
        <a href="/signup" class="btn-s"><i class="bi bi-person-plus"></i> Register Another</a>
    </div>
</div>
<div class="foot">© 2026 HireFlow</div>
</body>
</html>
