<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireFlow — Forgot Password</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --navy:#1a2744; --accent:#2563eb; --border:#e2e8f0; --muted:#64748b; --bg:#f8fafc; }
        html, body { height: 100%; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

        .logo-top { position: fixed; top: 20px; left: 28px; font-size: 1.2rem; font-weight: 700; color: var(--navy); text-decoration: none; letter-spacing: -0.3px; }
        .logo-top span { color: var(--accent); }

        .card { background: #fff; border-radius: 8px; border: 1px solid var(--border); padding: 40px 36px; width: 100%; max-width: 400px; }
        .icon { width: 52px; height: 52px; border-radius: 50%; background: #eff6ff; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: var(--accent); margin-bottom: 20px; }
        h2 { font-size: 1.4rem; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
        .sub { font-size: 0.86rem; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }

        .success { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; padding: 12px 14px; font-size: 0.84rem; color: #15803d; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 7px; }
        .iw { position: relative; }
        .iw .li { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.88rem; pointer-events: none; }
        .iw input { width: 100%; padding: 10px 14px 10px 36px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.875rem; font-family: 'Inter', sans-serif; background: #fff; color: #1e293b; outline: none; transition: border-color 0.18s, box-shadow 0.18s; }
        .iw input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
        .iw input::placeholder { color: #cbd5e1; }

        .btn-submit { width: 100%; padding: 11px; background: var(--navy); color: #fff; border: 2px solid var(--navy); border-radius: 6px; font-size: 0.875rem; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.18s; }
        .btn-submit:hover { background: #243358; }
        .back { display: block; text-align: center; margin-top: 16px; font-size: 0.82rem; color: var(--muted); text-decoration: none; }
        .back:hover { color: var(--accent); }
    </style>
</head>
<body>
<a href="/" class="logo-top">Hire<span>Flow</span></a>
<div class="card">
    <div class="icon"><i class="bi bi-envelope-fill"></i></div>
    <h2>Forgot Password?</h2>
    <p class="sub">Enter your email address and we'll send you a link to reset your password.</p>

    <div th:if="${msg}" class="success">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${msg}"></span>
    </div>

    <form th:if="${msg == null}" action="/forgot-password" method="post">
        <div class="field">
            <label>Email Address</label>
            <div class="iw">
                <i class="bi bi-envelope li"></i>
                <input type="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
        </div>
        <button type="submit" class="btn-submit">Send Reset Link</button>
    </form>
    <a href="/login" class="back"><i class="bi bi-arrow-left"></i> Back to Sign In</a>
</div>
</body>
</html>
