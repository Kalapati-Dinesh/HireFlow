<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireFlow — Job Form</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --navy:#1a2744; --navy2:#243358; --accent:#2563eb; --border:#e2e8f0; --muted:#64748b; --bg:#f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

        .topbar { background: var(--navy); padding: 0 48px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.2rem; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: -0.3px; }
        .logo span { color: #60a5fa; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-link { padding: 6px 14px; font-size: 0.82rem; font-weight: 600; color: #94a3b8; text-decoration: none; border-radius: 5px; transition: all 0.18s; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.08); color: #fff; }
        .nav-r { display: flex; align-items: center; gap: 16px; }
        .role-pill { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 5px 14px 5px 8px; font-size: 0.78rem; font-weight: 600; color: #94a3b8; }
        .av { width: 26px; height: 26px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.72rem; font-weight: 700; }
        .btn-out { font-size: 0.8rem; font-weight: 600; color: #64748b; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: color 0.18s; }
        .btn-out:hover { color: #f87171; }

        .wrap { max-width: 760px; margin: 0 auto; padding: 40px 24px; flex: 1; width: 100%; }
        .back { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 600; color: var(--muted); text-decoration: none; margin-bottom: 20px; transition: color 0.18s; }
        .back:hover { color: var(--accent); }
        .pg-head { margin-bottom: 28px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .pg-head .tag { font-size: 0.72rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        .pg-head h1 { font-size: 1.5rem; font-weight: 700; color: var(--navy); letter-spacing: -0.4px; }

        .card { background: #fff; border-radius: 8px; border: 1px solid var(--border); padding: 32px; }
        .sec-lbl { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #f1f5f9; }
        .sec-lbl:not(:first-child) { margin-top: 24px; }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        .field { margin-bottom: 0; }
        .field label { display: block; font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 7px; }
        .field input, .field select, .field textarea {
            width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 6px;
            font-size: 0.875rem; font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b;
            outline: none; transition: border-color 0.18s, background 0.18s;
        }
        .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
        .field input::placeholder, .field textarea::placeholder { color: #cbd5e1; }
        .field textarea { resize: vertical; min-height: 120px; }

        .form-actions { display: flex; gap: 12px; margin-top: 28px; }
        .btn-save { padding: 10px 24px; background: var(--navy); color: #fff; border: 2px solid var(--navy); border-radius: 6px; font-size: 0.875rem; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background 0.18s; }
        .btn-save:hover { background: var(--navy2); border-color: var(--navy2); }
        .btn-cancel { padding: 10px 20px; background: #fff; color: #374151; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.875rem; font-weight: 600; text-decoration: none; transition: background 0.18s; }
        .btn-cancel:hover { background: var(--bg); color: #374151; }

        footer { background: var(--navy); color: #334155; text-align: center; padding: 16px; font-size: 0.75rem; margin-top: auto; }
        @media (max-width: 600px) { .row2, .row3 { grid-template-columns: 1fr; } .topbar { padding: 0 20px; } }
    </style>
</head>
<body>

<nav class="topbar">
    <a href="/" class="logo">Hire<span>Flow</span></a>
    <div class="nav-links">
        <a href="/recruiter/dashboard" class="nav-link">Dashboard</a>
        <a href="/recruiter/jobs" class="nav-link active">Job Postings</a>
        <a href="/recruiter/applications" class="nav-link">Applications</a>
    </div>
    <div class="nav-r">
        <div class="role-pill"><div class="av">R</div> Recruiter</div>
        <a href="/logout" class="btn-out"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</nav>

<div class="wrap">
    <a href="/recruiter/jobs" class="back"><i class="bi bi-arrow-left"></i> Back to Job Postings</a>
    <div class="pg-head">
        <div class="tag">Recruiter</div>
        <h1 th:text="${job.id != null ? 'Edit Job Posting' : 'Post New Job'}">Post New Job</h1>
    </div>

    <div class="card">
        <form th:action="${job.id != null ? '/recruiter/jobs/' + job.id + '/update' : '/recruiter/jobs/save'}" method="post">

            <div class="sec-lbl">Job Information</div>
            <div class="row2" style="margin-bottom:16px;">
                <div class="field"><label>Job Title *</label><input type="text" name="title" th:value="${job.title}" placeholder="e.g. Software Engineer" required></div>
                <div class="field"><label>Department *</label><input type="text" name="department" th:value="${job.department}" placeholder="e.g. Engineering" required></div>
            </div>
            <div class="row3" style="margin-bottom:16px;">
                <div class="field">
                    <label>Job Type *</label>
                    <select name="jobType" required>
                        <option value="">Select type</option>
                        <option value="FULL_TIME"  th:selected="${job.jobType == 'FULL_TIME'}">Full Time</option>
                        <option value="PART_TIME"  th:selected="${job.jobType == 'PART_TIME'}">Part Time</option>
                        <option value="CONTRACT"   th:selected="${job.jobType == 'CONTRACT'}">Contract</option>
                        <option value="INTERNSHIP" th:selected="${job.jobType == 'INTERNSHIP'}">Internship</option>
                    </select>
                </div>
                <div class="field"><label>Location *</label><input type="text" name="location" th:value="${job.location}" placeholder="e.g. Chennai, India" required></div>
                <div class="field"><label>Salary Range</label><input type="text" name="salaryRange" th:value="${job.salaryRange}" placeholder="e.g. ₹8L – ₹12L"></div>
            </div>
            <div class="field" style="margin-bottom:16px;">
                <label>Application Deadline *</label>
                <input type="date" name="deadline" th:value="${job.deadline}" required>
            </div>

            <div class="sec-lbl">Job Details</div>
            <div class="field" style="margin-bottom:16px;">
                <label>Job Description *</label>
                <textarea name="description" placeholder="Describe the role, responsibilities, and what the candidate will be working on..." required th:text="${job.description}"></textarea>
            </div>
            <div class="field">
                <label>Requirements</label>
                <textarea name="requirements" placeholder="List the skills, qualifications, and experience required..." th:text="${job.requirements}"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">
                    <i class="bi bi-check2"></i>
                    <span th:text="${job.id != null ? 'Update Job' : 'Post Job'}">Post Job</span>
                </button>
                <a href="/recruiter/jobs" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer>© 2026 HireFlow</footer>
</body>
</html>
